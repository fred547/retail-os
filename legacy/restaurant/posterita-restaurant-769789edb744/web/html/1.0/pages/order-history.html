<div id="header" ng-include="'pages/header.html'"></div>

	<div class="column-container" style="padding: 0px 10px;">

			<h3 style="margin-top: 5px;" class="report-title">Sales History</h3>
		</div>
		<div style="text-align: right;">
			<button class="btn btn-primary" ng-debounced-click="showSearchDialog()">
				<span class="glyphicon glyphicon-search"></span> Search
			</button>
		</div>
		
	</div>			
			
	<table cellpadding="0" cellspacing="0" border="0" class="display" id="order_table">

				<th data-i18n="date.ordered">Date Ordered</th>

		</thead>
		<tbody>		
		</tbody>
		<tfoot>
			<tr>
				<th data-i18n="date.ordered">Date Ordered</th>
				<th data-i18n="order.type">Order Type</th>
				<th data-i18n="document.no">Document No</th>						
				<th data-i18n="status">Status</th>
				<th data-i18n="customer">Customer</th>
				<th data-i18n="payment">Payment</th>

		</tfoot>
