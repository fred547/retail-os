<script type="text/ng-template" id="/html/popups/switch-table.html">
<div class="modal-content" data-test-id="switch-table-panel">
	<div class="modal-header">
		 <button type="button" class="close" data-ng-debounced-click="$close()"><span>&times;</span></button>
		<h4 class="modal-title">
			<i class="fa fa-question-circle"></i>
			Switch Table #{{ $ctrl.activeTable.name }}
		</h4>
	</div>
	<div class="modal-body">
	
		<!-- 
		<form name="myform">
		  <div class="form-group">
		    <label for="popup-input-textfield">Choose Table:</label>
		    <select class="form-control input-lg" ng-model="to_table" ng-options="table.name for table in $ctrl.availableTables track by table.table_id"></select>
		  </div>
		</form>	
		 -->
		 
		<form name="myform">
		  <div class="form-group">
		    <button data-test-id="table-{{table.table_id}}" class="merge-table-button" ng-class="{ 'btn-warning' : table.table_id == to_table.table_id }" ng-debounced-click="$ctrl.setToTable(table)" ng-repeat="table in $ctrl.availableTables | orderBy : 'table_id'">{{table.name}}</button>
		  </div>
		</form>		
		
	</div>
	<div class="modal-footer">
		 <button type="button" class="btn btn-lg btn-success" ng-debounced-click="$ctrl.ok()" ng-disabled="to_table == null">
			OK
		</button>
		<button type="button" class="btn btn-lg btn-danger" ng-debounced-click="$ctrl.cancel()">
			Cancel
		</button>
	</div>
</div>
</script>

<script type="text/ng-template" id="/html/popups/sync-draft-and-open-orders.html">
<div class="modal-content" data-test-id="sync-draft-and-open-orders-popup">
	<div class="modal-header">		 
		<h4 class="modal-title">
			<i class="fa fa-question-circle"></i>
			Synchronize Draft & Open Orders
		</h4>
	</div>
	<div class="modal-body draft-and-open-order">
		<div>Found:</div>
		<ul>
			<li ng-show="$ctrl.draftOrders.length > 0 ">
				<span class="text-danger">{{ $ctrl.draftOrders.length }} Draft {{ $ctrl.draftOrders.length == 1 ? 'Order' : 'Orders' }}.</span>
			</li>
			
			<li ng-show="$ctrl.openOrders.length > 0 ">
				<span class="text-danger">{{ $ctrl.openOrders.length }} Open {{ $ctrl.openOrders.length == 1 ? 'Order' : 'Orders' }}.</span>
			</li>		
		</ul>
		
		<div>Do you want to synchronize them ?</div>
	</div>
	<div class="modal-footer">
		 <button type="button" class="btn btn-lg btn-success" ng-debounced-click="$ctrl.yes()" data-test-id="yes-button">
			Yes
		</button>
		<button type="button" class="btn btn-lg btn-danger" ng-debounced-click="$ctrl.no()" data-test-id="no-button">
			No
		</button>
	</div>
</div>
</script>

<script type="text/ng-template" id="/html/popups/synchronize.html">

			Cancel
		</button>
	</div>
</div>
</script>
