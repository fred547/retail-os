<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
	
	<link href="layout.css" media="all" rel="stylesheet" type="text/css">
	<style type="text/css">
	
		
		#product-search-result-container div.column-container > div
		{
			vertical-align: middle;
		}
		
		#product-search-result-container .product-search-result-header {
			background-color: #d7d8da;
			color: #5b5b5b;		
		}
		
		.product-search-result div.column-container
		{
			min-height: 40px;
		}
		
		.product-search-result div.column-container div:nth-child(2)
		{
			text-align:right;
			width:10%
		}
		
		.product-search-result div.column-container:nth-child(even)
		{
			background-color:#e5e5e5;
		}
		
		.product-search-result div.column-container:nth-child(odd)
		{
			background-color:#FFF;
		}
	</style>
</head>
<body>
<!-- start of template -->
	<!-- product list -->
	<div class="row-container" style="height: 100%;" id="product-search-result-container">
	
		<!-- product list header -->
		<div style="height:30px;">

				<div>
					Name/Description
				</div>
				
				<div style="text-align: right;">
					Stock in Hand
				</div>
			</div>
			
		</div>
		<!-- product list header -->
		
		<!-- product list result box -->
		<div class="product-search-result">

			<div class="column-container">
				<div>

				</div>

			</div>
			<!-- product result 1 -->
			
			<!-- product result 2 -->
			<div class="column-container">
				<div>
					100% Mauritian P <br/>

				</div>
				
				<div>
					432

			</div>
			<!-- product result 2 -->
			
			<!-- product result 3 -->
			<div class="column-container">

				</div>

			</div>

	</div>
	<!-- product list -->

</body>
</html>
