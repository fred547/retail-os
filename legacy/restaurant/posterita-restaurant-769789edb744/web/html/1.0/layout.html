<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
	<meta content="default-src * data:; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'" http-equiv="Content-Security-Policy">
	<title>Layout</title>
	<link href="../../bootstrap-3.1.1/css/bootstrap.css" media="screen" rel="stylesheet" type="text/css">
	<link href="../../css/glyphicons/css/glyphicons.css" rel="stylesheet">
	<link href="layout.css" media="all" rel="stylesheet" type="text/css">
	<style type="text/css">
	   
	    html, body {
	    
	       overflow: hidden;
	       height: 100%;
	    
	    }
	    
	    #main-container {
	       height: 100%;
	    }
	   
	    #main-container #header {
	        height: 50px;
	    }
	    #main-container #footer {
	        height: 45px;
	    }
	    
	    #main-container #header, #main-container #footer {
	    
	     background-color: #363535;          
	     width: 100%;
	     
	     font-family: Roboto;
	     font-size: 10pt;
	     color: #A8A8A8;
	    
	    }
	</style>
	
	<script src="angular.js" type="text/javascript"></script>
	<script src="ui-bootstrap-tpls-0.11.0.js" type="text/javascript"></script>
	<script src="data.js" type="text/javascript"></script>
	<script src="forus.js" type="text/javascript"></script>
	
</head>
<body ng-app="app">
	<div class="row-container" id="main-container">
	
		<div id="header">
			Header
		</div>
		
		<div id="body-content">
			<div class="row-container" style="height: 100%">
			
				<!-- first row -->
				<div style="height: 50px;">
				
					<!-- search product & search customer -->
					<div class="column-container">
					
						<!-- search product -->
						<div>
						
							<div class="column-container">
							
								<div>
									<input type="text" style="width: 100%">
								</div>
								
								<div style="width: 50px;">
									<button class="btn btn-default" type="button">
							        	<i class="glyphicon glyphicon-search"></i>
							        </button>
								</div>
								
							</div>
						
						</div><!-- search product -->
						
						<!-- search customer -->
						<div style="width:40%">
						
							<div class="column-container">
							
								<div>
									<input type="text" style="width: 100%">
								</div>
								
								<div style="width: 100px;">
									<button class="btn btn-default" type="button">
							        	<i class="glyphicon glyphicon-search"></i>
							        </button>
							        <button class="btn btn-default" type="button">
							        	<i class="glyphicon glyphicon-search"></i>
							        </button>
								</div>
								
							</div>
						
						</div><!-- search customer -->
						
					</div><!-- search product & search customer -->
					
				</div><!-- first row -->
				
				<!-- second row -->
				<div>
				
					<!-- glider, product list & shopping cart -->
					<div class="column-container" style="height: 100%">
					
						<!-- glider -->
						<div style="width: 15%;">
							glider
						</div><!-- glider -->
						
						<!-- product list -->
						<div style="width: 45%;">
							
							<div class="row-container" style="height: 100%">
								
								<!-- product list header -->
								<div style="height:50px">
									
									

								</div><!-- product list header -->
								
								<!-- product list result -->
								<div>
									result
								</div><!-- product list result -->
								
							</div>
							
						</div><!-- product list -->
						
						<!-- shopping cart -->
						<div style="width: 40%;">
							
							<div class="row-container" style="height: 100%;">
								<!-- shopping cart lines-->
								<div>
									<div class="row-container shopping-cart-lines">
										<div class="row">
											<div>
												1
											</div>
											<div>
												Product 1<br>
												Description
											</div>
											<div>
												100
											</div>
											<div>
												X
											</div>
										</div>
									</div>
								</div><!-- shopping cart lines-->
								<!-- shopping cart totals-->
								<div style="height: 100px;">
									<div class="row-container shopping-cart-totals">
										<div class="row">
											<div style="width:10%;">
												&nbsp;
											</div>
											<div style="width:40%;">
												subtotal
											</div>
											<div style="width:50%;">
												1
											</div>
										</div>
										<div class="row">
											<div>
												&nbsp;
											</div>
											<div>
												taxtotal
											</div>
											<div>
												1
											</div>
										</div>
										<div class="row">
											<div>
												1x
											</div>
											<div>
												grandtotal
											</div>
											<div>
												1
											</div>
										</div>
									</div>
								</div><!-- shopping cart totals-->
								<!-- order buttons -->
								<div style="height: 100px;" class="shopping-cart-buttons">
									<div class="column-container">
										<div>
											<button class="btn btn-success">Check Out</button>
										</div>
									</div>
									<div class="column-container">
										<div>
											<button class="btn btn-primary">1</button>
										</div>
										<div>
											<button class="btn btn-default">2</button>
										</div>
									</div>
									<div class="column-container">
										<div>
											<button class="btn btn-danger">1</button>
										</div>
										<div>
											<button class="btn btn-danger">2</button>
										</div>
										<div>
											<button class="btn btn-danger">3</button>
										</div>
										<div>
											<button class="btn btn-danger">4</button>
										</div>
									</div>
								</div><!-- order buttons -->
							</div>
							
						</div><!-- shopping cart -->
						
					</div><!-- glider, product list & shopping cart -->
					
				</div><!-- second row -->
				
			</div>
		</div>
		
		<div id="footer">
			Footer
		</div>
		
	</div>	
</body>
</html>
