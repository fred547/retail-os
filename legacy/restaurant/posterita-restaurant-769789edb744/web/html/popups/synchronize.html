<div class="modal-content" data-test-id="synchronize-popup">
	<div class="modal-header">
		 <button type="button" class="close" data-test-id="cancel-popup" data-ng-debounced-click="$close()"><span>&times;</span></button>
		<h4 class="modal-title">
			Synchronize POS
		</h4>
	</div>
	<div class="modal-body">
		Click the synchronize button to launch the synchronization process.
	</div>
	<div class="modal-footer">
		 <button type="button" data-test-id="synchronize-button" class="btn btn-lg btn-success" ng-debounced-click="$ctrl.sync()">
			Synchronize
		</button>
		<button type="button" class="btn btn-lg btn-danger" ng-debounced-click="$close()">
			Cancel
		</button>
	</div>
</div>
