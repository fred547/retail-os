<div class="modal-content" data-test-id="external-card-confirmation-popup">
<div class="modal-header">
  <button type="button" class="close" data-ng-debounced-click="$close()"><span>&times;</span></button>
  <h4 class="modal-title">
  	<span class="glyphicons glyphicons-tablet modal-header-icon"></span>
  	<span data-i18n="payment.external.card">Payment External Card</span>
  </h4>
</div>
<div class="modal-body">
  
  <div class="row-container">
						
		<div class="row">
			<div>
				<p data-i18n="has.the.payment.gone.through">Has the payment gone through?</p>
			</div>			
		</div>
	
	</div>
  
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-lg btn-danger button-red" data-ng-debounced-click="$close()">
  	<div class="" data-i18n="no">No</div>
  </button>
  
  <button type="button" class="btn btn-lg btn-success button-green" data-ng-debounced-click="paymentAccepted()">
  	<div class="" data-i18n="proceed">Proceed</div>
  </button>
</div>
</div><!-- /.modal-content -->
