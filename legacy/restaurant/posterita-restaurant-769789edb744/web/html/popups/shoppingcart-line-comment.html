<div class="modal-content" data-test-id="line-comment-popup">
  <div class="modal-header">
    <button type="button" class="close" data-ng-debounced-click="$close()"><span>&times;</span></button>
    <h4 class="modal-title">
    	<span class="glyphicons glyphicons-comments modal-header-icon"></span>
		<span data-i18n="comments">Comments - {{ $ctrl.product.name }}</span>
    </h4>
  </div>
  <div class="modal-body">
      
     <form name="myform">
	  <div class="form-group">
	    <label for="comments" data-i18n="enter.comments">Enter Comments:</label>
	    <textarea rows="6" class="form-control" id="comments" name="comments" ng-model="$ctrl.comments" required="required"></textarea>
	  </div>
	</form>
    
  </div>
  <div class="modal-footer">
  	<button type="button" class="btn btn-danger button-red btn-lg pull-left" ng-debounced-click="$ctrl.suite()" data-test-id="suite-button">
		<div data-i18n="suite">Suite</div>
	</button>
    <button type="button" class="btn btn-lg btn-success button-green" data-ng-debounced-click="$ctrl.addComment($ctrl.comments)" data-test-id="save-button">
    	<div data-i18n="save">Save</div>
    </button>
  </div>
</div><!-- /.modal-content -->
