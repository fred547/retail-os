name: CI

on:
  push:
    branches: [main, Fred]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────
  # Android Unit Tests
  # ──────────────────────────────────────────────────
  android-unit-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

  # ──────────────────────────────────────────────────
  # Android Lint
  # ──────────────────────────────────────────────────
  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-results
          path: app/build/reports/lint-results-debug.html

  # ──────────────────────────────────────────────────
  # Web (Next.js) Tests
  # ──────────────────────────────────────────────────
  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-side/posterita-cloud/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server-side/posterita-cloud/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key

  # ──────────────────────────────────────────────────
  # Web TypeScript Check
  # ──────────────────────────────────────────────────
  web-typecheck:
    name: Web TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-side/posterita-cloud/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server-side/posterita-cloud/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true
