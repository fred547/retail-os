name: CI

on:
  push:
    branches: [main, Fred]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────
  # Android Unit Tests
  # ──────────────────────────────────────────────────
  android-unit-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Count test results
        if: always()
        id: android-count
        run: |
          PASSED=$(find app/build/test-results -name "*.xml" -exec grep -c 'testcase' {} + 2>/dev/null | awk -F: '{s+=$NF} END {print s}' || echo 0)
          FAILED=$(find app/build/test-results -name "*.xml" -exec grep -c '<failure' {} + 2>/dev/null | awk -F: '{s+=$NF} END {print s}' || echo 0)
          FILES=$(find app/build/test-results -name "*.xml" 2>/dev/null | wc -l | tr -d ' ')
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Android: $PASSED passed, $FAILED failed across $FILES files"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/

    outputs:
      passed: ${{ steps.android-count.outputs.passed }}
      failed: ${{ steps.android-count.outputs.failed }}
      files: ${{ steps.android-count.outputs.files }}

  # ──────────────────────────────────────────────────
  # Android Lint
  # ──────────────────────────────────────────────────
  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: true

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-results
          path: app/build/reports/lint-results-debug.html

  # ──────────────────────────────────────────────────
  # Web (Next.js) Tests
  # ──────────────────────────────────────────────────
  web-tests:
    name: Web Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-side/posterita-cloud/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server-side/posterita-cloud/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: web-tests
        run: |
          npx vitest run --reporter=json 2>/dev/null | tee test-output.json || true
          # Parse results
          PASSED=$(node -e "try{const r=require('./test-output.json');console.log(r.numPassedTests||0)}catch{console.log(0)}")
          FAILED=$(node -e "try{const r=require('./test-output.json');console.log(r.numFailedTests||0)}catch{console.log(0)}")
          FILES=$(node -e "try{const r=require('./test-output.json');console.log(r.numPassedTestSuites||0)}catch{console.log(0)}")
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Web: $PASSED passed, $FAILED failed across $FILES files"
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key

    outputs:
      passed: ${{ steps.web-tests.outputs.passed }}
      failed: ${{ steps.web-tests.outputs.failed }}
      files: ${{ steps.web-tests.outputs.files }}

  # ──────────────────────────────────────────────────
  # Web TypeScript Check
  # ──────────────────────────────────────────────────
  web-typecheck:
    name: Web TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-side/posterita-cloud/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server-side/posterita-cloud/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        id: typecheck
        run: |
          ERRORS=$(npx tsc --noEmit 2>&1 | grep -c "error TS" || echo 0)
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          if [ "$ERRORS" -gt 0 ]; then
            echo "TypeScript: $ERRORS errors"
            npx tsc --noEmit 2>&1 | head -30
            exit 1
          else
            echo "TypeScript: clean"
          fi

    outputs:
      errors: ${{ steps.typecheck.outputs.errors }}

  # ──────────────────────────────────────────────────
  # Production Smoke Tests (hit real API + DB)
  # ──────────────────────────────────────────────────
  smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: server-side/posterita-cloud/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server-side/posterita-cloud/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npx vitest run src/__tests__/api/smoke-test.test.ts
        continue-on-error: true
        env:
          SMOKE_TEST_URL: https://web.posterita.com
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  # ──────────────────────────────────────────────────
  # Report Results to Platform
  # ──────────────────────────────────────────────────
  report-to-platform:
    name: Report to Platform
    runs-on: ubuntu-latest
    needs: [android-unit-tests, web-tests, web-typecheck]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Post test results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANDROID_PASSED: ${{ needs.android-unit-tests.outputs.passed }}
          ANDROID_FAILED: ${{ needs.android-unit-tests.outputs.failed }}
          ANDROID_FILES: ${{ needs.android-unit-tests.outputs.files }}
          WEB_PASSED: ${{ needs.web-tests.outputs.passed }}
          WEB_FAILED: ${{ needs.web-tests.outputs.failed }}
          WEB_FILES: ${{ needs.web-tests.outputs.files }}
          TS_ERRORS: ${{ needs.web-typecheck.outputs.errors }}
        run: |
          # Build version string from git
          VERSION=$(git rev-parse --short HEAD)
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s | head -c 200)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "=== CI Report ==="
          echo "Version: $VERSION ($BRANCH)"
          echo "Android: ${ANDROID_PASSED:-0} passed, ${ANDROID_FAILED:-0} failed"
          echo "Web: ${WEB_PASSED:-0} passed, ${WEB_FAILED:-0} failed"
          echo "TypeScript errors: ${TS_ERRORS:-0}"

          # Post to Supabase ci_report table
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_KEY" ]; then
            curl -s -X POST "${SUPABASE_URL}/rest/v1/ci_report" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{
                \"git_sha\": \"${VERSION}\",
                \"branch\": \"${BRANCH}\",
                \"commit_message\": $(echo "$COMMIT_MSG" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))'),
                \"android_passed\": ${ANDROID_PASSED:-0},
                \"android_failed\": ${ANDROID_FAILED:-0},
                \"android_files\": ${ANDROID_FILES:-0},
                \"web_passed\": ${WEB_PASSED:-0},
                \"web_failed\": ${WEB_FAILED:-0},
                \"web_files\": ${WEB_FILES:-0},
                \"ts_errors\": ${TS_ERRORS:-0},
                \"status\": \"$([ \"${ANDROID_FAILED:-0}\" = \"0\" ] && [ \"${WEB_FAILED:-0}\" = \"0\" ] && echo 'pass' || echo 'fail')\",
                \"created_at\": \"${TIMESTAMP}\"
              }" && echo "Posted to platform" || echo "Failed to post (secrets may not be configured)"
          else
            echo "Skipping platform report (SUPABASE_URL not configured)"
          fi
