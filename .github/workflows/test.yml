name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-tests:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pos-android/server-side/posterita-cloud/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pos-android/server-side/posterita-cloud/web/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  android-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pos-android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - run: ./gradlew testDebugUnitTest

  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: web-tests
    defaults:
      run:
        working-directory: pos-android/server-side/posterita-cloud/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pos-android/server-side/posterita-cloud/web/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://web.posterita.com
